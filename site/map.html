<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cammino di Santiago — Mappa</title>
  <link rel="stylesheet" href="/styles.css" />
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" href="/favicon.png" />
</head>
<body>
  <header class="hero">
    <div class="hero__inner">
      <div class="hero__top">
        <div class="hero__title">
          <span class="eyebrow">Mappa del percorso</span>
          <h1>Cammino di Santiago</h1>
          <p class="lead">Traccia ricavata dai metadati GPS delle foto e dei video.</p>
        </div>
        <div class="controls">
          <a class="view-btn active" href="/it/">Torna al diario</a>
        </div>
      </div>
    </div>
  </header>

  <main class="content">
    <div id="map" style="height: 70vh; border-radius: 18px; box-shadow: var(--shadow);"></div>
  </main>
  <div id="map-media-modal" class="map-media-modal" aria-hidden="true">
    <div class="map-media-modal__backdrop" id="map-media-modal-backdrop"></div>
    <div class="map-media-modal__dialog" role="dialog" aria-modal="true" aria-label="Media">
      <button type="button" class="map-media-modal__close" id="map-media-modal-close" aria-label="Chiudi">×</button>
      <a class="map-media-modal__meta map-media-modal__meta--link" id="map-media-modal-meta" href="#"></a>
      <div class="map-media-modal__body" id="map-media-modal-body"></div>
    </div>
  </div>
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script src="/map.js"></script>
</body>
</html>
